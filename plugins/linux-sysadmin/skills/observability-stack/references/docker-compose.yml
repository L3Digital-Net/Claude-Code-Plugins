# Observability Stack — Docker Compose
#
# Deploys: Prometheus, Grafana, Loki, Promtail, Node Exporter, Alertmanager
# All services pre-wired: Prometheus scrapes Node Exporter, Grafana has
# Prometheus + Loki datasources provisioned, Alertmanager integrated.
#
# Prerequisites:
#   mkdir -p prometheus/rules alertmanager \
#            grafana/provisioning/datasources grafana/provisioning/dashboards \
#            loki promtail
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   Open http://localhost:3000 (Grafana, admin/admin)
#
# Required config files (create before starting):
#   prometheus/prometheus.yml    — scrape configuration
#   prometheus/rules/*.yml       — alerting/recording rules (optional)
#   alertmanager/alertmanager.yml — notification routing
#   loki/loki-config.yml         — Loki storage and limits
#   promtail/promtail-config.yml — log scrape targets
#   grafana/provisioning/datasources/datasources.yml — auto-configured sources

services:

  # --- Prometheus: metrics collection and alerting engine ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'          # allows POST /-/reload
      - '--web.enable-admin-api'          # allows TSDB admin endpoints
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  # --- Alertmanager: alert routing and notification ---
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  # --- Node Exporter: host-level hardware and OS metrics ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      # Mount host filesystem read-only for accurate host metrics
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host       # required for accurate process and CPU metrics
    networks:
      - monitoring

  # --- Loki: log aggregation (label-indexed, low resource overhead) ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command:
      - '-config.file=/etc/loki/config.yaml'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - monitoring

  # --- Promtail: log shipper (tails files and journals, pushes to Loki) ---
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yaml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # optional: Docker log discovery
    command:
      - '-config.file=/etc/promtail/config.yaml'
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring

  # --- Grafana: dashboards and visualization ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin     # CHANGE for production
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
