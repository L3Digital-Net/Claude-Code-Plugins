# Chart.yaml — Annotated Template
# Required fields: apiVersion, name, version
# Reference: https://helm.sh/docs/topics/charts/#the-chartyaml-file

# API version of the chart schema. Must be "v2" for Helm 3/4 charts.
# "v1" was for Helm 2 and is no longer recommended.
apiVersion: v2

# The name of the chart. Must match the directory name.
# Used as the default OCI artifact name when pushing to registries.
name: mychart

# SemVer 2 version of the chart itself (not the application).
# Bump this on every change to the chart. Helm uses this for
# dependency resolution, upgrade comparison, and OCI tagging.
version: 0.1.0

# Version of the application being deployed. Informational only;
# Helm does not use this for dependency resolution or upgrades.
# Appears in `helm list` output and can be referenced in templates
# as .Chart.AppVersion (useful for image tags).
appVersion: "1.0.0"

# Human-readable description. Shown by `helm search` and Artifact Hub.
description: A Helm chart for deploying MyApp

# Chart type: "application" (default) or "library".
# Application charts produce Kubernetes manifests.
# Library charts provide reusable templates but render no output on their own.
type: application

# SemVer constraint on the target Kubernetes cluster version.
# Helm checks this at install/upgrade time and fails if the cluster
# does not satisfy the constraint. Uses standard semver range syntax.
# kubeVersion: ">=1.25.0-0"

# Project home page URL. Shown on Artifact Hub.
# home: https://example.com/mychart

# List of URLs to source code.
# sources:
#   - https://github.com/example/mychart

# Searchable keywords for Artifact Hub and `helm search`.
# keywords:
#   - web
#   - proxy
#   - nginx

# Chart maintainers. Name is required; email and url are optional.
# maintainers:
#   - name: Jane Doe
#     email: jane@example.com
#     url: https://example.com/jane

# URL to a chart icon (SVG or PNG). Displayed on Artifact Hub.
# icon: https://example.com/icon.png

# Mark a chart as deprecated. Helm will warn on install.
# deprecated: false

# Free-form annotations for metadata, tooling integration, etc.
# annotations:
#   artifacthub.io/license: Apache-2.0
#   artifacthub.io/links: |
#     - name: Documentation
#       url: https://example.com/docs

# Chart dependencies. Helm downloads these into charts/ on
# `helm dependency update`. Each entry needs name and version;
# repository can be a URL, alias (@reponame), or OCI reference.
# dependencies:
#   - name: postgresql
#     version: "12.x.x"                # SemVer range or exact version
#     repository: https://charts.bitnami.com/bitnami
#     # condition: postgresql.enabled   # toggle via values.yaml boolean
#     # tags:                           # group deps by tag
#     #   - database
#     # alias: db                       # rename for values scoping
#     # import-values:                  # import child values into parent
#     #   - data
